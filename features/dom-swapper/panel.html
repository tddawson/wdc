<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 16px;
      color: #1a1a1a;
    }
    h2 { font-size: 16px; margin-bottom: 12px; }
    .field {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      background: #4285f4;
      color: #fff;
    }
    button:hover { background: #3367d6; }
    button.secondary {
      background: #f1f1f1;
      color: #333;
    }
    button.secondary:hover { background: #ddd; }
    #result {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>DOM Swapper</h2>
  <div class="field">
    <label for="find">Find text</label>
    <input type="text" id="find" placeholder="Text to find...">
  </div>
  <div class="field">
    <label for="replace">Replace with</label>
    <input type="text" id="replace" placeholder="Replacement text...">
  </div>
  <div class="btn-row">
    <button id="swap-btn">Replace</button>
    <button id="undo-btn" class="secondary">Undo All</button>
  </div>
  <p id="result"></p>
  <script src="panel.js"></script>
</body>
</html>
