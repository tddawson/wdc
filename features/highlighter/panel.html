<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 16px;
      color: #1a1a1a;
    }
    h2 { font-size: 16px; margin-bottom: 12px; }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      background: #4285f4;
      color: #fff;
    }
    button:hover { background: #3367d6; }
    button.secondary {
      background: #f1f1f1;
      color: #333;
    }
    button.secondary:hover { background: #ddd; }
    #result {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>Highlighter</h2>
  <div class="search-row">
    <input type="text" id="query" placeholder="Search term...">
    <button id="highlight-btn">Find</button>
  </div>
  <button id="clear-btn" class="secondary">Clear</button>
  <p id="result"></p>
  <script src="panel.js"></script>
</body>
</html>
