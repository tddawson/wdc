<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="/tailwind.js"></script>
    <style></style>
  </head>
  <body>
    <div
      class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between"
    >
      <h2 class="font-bold tracking-wider text-xl">Wordle Widle Webble</h2>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center p-4">
      <div class="mb-4 text-center">
        <span
          class="inline-block px-2 py-0.5 rounded bg-primary text-white text-[10px] font-bold tracking-widest uppercase mb-1"
          >Active Game</span
        >
      </div>
      <div
        id="selected-words"
        class="mb-4 p-2 bg-gray-100 rounded min-h-[2rem] w-full max-w-sm text-center"
      >
        <span class="text-xs text-gray-400">Click a word on the page</span>
      </div>
      <div id="letter-grid" class="gap-1.5 mb-8 hidden"></div>
      <div id="keyboard" class="w-full max-w-sm space-y-2">
        <div class="flex justify-center gap-1.5">
          <button data-key="Q" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">Q</button>
          <button data-key="W" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">W</button>
          <button data-key="E" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">E</button>
          <button data-key="R" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">R</button>
          <button data-key="T" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">T</button>
          <button data-key="Y" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">Y</button>
          <button data-key="U" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">U</button>
          <button data-key="I" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">I</button>
          <button data-key="O" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">O</button>
          <button data-key="P" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">P</button>
        </div>
        <div class="flex justify-center gap-1.5">
          <button data-key="A" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">A</button>
          <button data-key="S" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">S</button>
          <button data-key="D" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">D</button>
          <button data-key="F" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">F</button>
          <button data-key="G" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">G</button>
          <button data-key="H" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">H</button>
          <button data-key="J" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">J</button>
          <button data-key="K" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">K</button>
          <button data-key="L" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">L</button>
        </div>
        <div class="flex justify-center gap-1.5">
          <button data-key="Z" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">Z</button>
          <button data-key="X" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">X</button>
          <button data-key="C" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">C</button>
          <button data-key="V" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">V</button>
          <button data-key="B" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">B</button>
          <button data-key="N" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">N</button>
          <button data-key="M" class="key h-12 w-8 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">M</button>
        </div>
        <div class="flex justify-center gap-1.5">
          <button data-key="ENTER" class="h-12 px-3 bg-gray-200 hover:bg-gray-300 rounded text-[10px] font-bold transition-colors">ENTER</button>
          <button data-key="BACKSPACE" class="h-12 px-3 bg-gray-200 hover:bg-gray-300 rounded text-xs font-bold transition-colors">←</button>
        </div>
      </div>
    </div>

    <script src="panel.js"></script>
  </body>
</html>
