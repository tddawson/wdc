<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 16px;
      color: #1a1a1a;
    }
    h2 { font-size: 16px; margin-bottom: 12px; }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      background: #4285f4;
      color: #fff;
      margin-bottom: 16px;
    }
    button:hover { background: #3367d6; }
    .stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .stat .label { color: #555; }
    .stat .value { font-weight: 600; }
  </style>
</head>
<body>
  <h2>Word Counter</h2>
  <button id="count-btn">Count Words</button>
  <div class="stats">
    <div class="stat">
      <span class="label">Total words</span>
      <span class="value" id="total">—</span>
    </div>
    <div class="stat">
      <span class="label">Unique words</span>
      <span class="value" id="unique">—</span>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
