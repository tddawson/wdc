<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Collapse Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --bg-panel-dark: #1a1a1a;
            --bg-panel-darker: #111111;
            --primary: #1ff968;
            --text-primary: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Or panel color if it fills iframe */
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        aside {
            background-color: var(--bg-panel-dark);
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 1px solid var(--border-color);
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h2 {
            font-size: 0.8rem;
            font-weight: 400;
            margin: 5px 0 0 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Radio Buttons for Direction */
        .direction-selector {
            display: flex;
            gap: 10px;
            background: var(--bg-panel-darker);
            padding: 5px;
            border-radius: 12px;
            justify-content: space-between;
        }

        .direction-option {
            flex: 1;
            position: relative;
        }

        .direction-option input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .direction-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .direction-option input:checked + .direction-icon {
            background-color: var(--primary);
            color: var(--bg-panel-dark);
            box-shadow: 0 0 10px rgba(31, 249, 104, 0.3);
        }

        .direction-option input:hover + .direction-icon {
            color: var(--text-primary);
        }

        /* Sliders */
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .slider-value {
            color: var(--primary);
            font-family: monospace;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--bg-panel-darker);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 2px solid var(--bg-panel-dark);
        }

        /* Buttons */
        .btn {
            background: var(--bg-panel-darker);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-large {
            padding: 20px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-panel-dark);
            border: none;
        }
        
        .btn-primary:hover {
            background: #18d657;
            color: var(--bg-panel-dark);
        }

        .shortcut-hint {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-muted);
        }

        /* Magnet Toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-panel-darker);
            border-radius: 12px;
            cursor: pointer;
        }
        
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-input {
            display: none;
        }

        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-input:checked + .toggle-switch {
            background: var(--primary);
        }

        .toggle-input:checked + .toggle-switch .toggle-knob {
            transform: translateX(20px);
        }

        footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .material-symbols-outlined {
            font-size: 20px;
        }

    </style>
</head>
<body>
    <aside>
        <header>
            <h1>Gravity Collapse</h1>
            <h2>Physics Lab v2.4</h2>
        </header>
        
        <div class="content">
            <!-- Gravity Direction -->
            <div>
                <div class="section-title">Gravity Direction</div>
                <div class="direction-selector">
                    <div class="direction-option">
                        <input type="radio" name="gravity-dir" value="up">
                        <div class="direction-icon"><span class="material-symbols-outlined">arrow_upward</span></div>
                    </div>
                    <div class="direction-option">
                        <input type="radio" name="gravity-dir" value="down" checked>
                        <div class="direction-icon"><span class="material-symbols-outlined">arrow_downward</span></div>
                    </div>
                    <div class="direction-option">
                        <input type="radio" name="gravity-dir" value="left">
                        <div class="direction-icon"><span class="material-symbols-outlined">arrow_back</span></div>
                    </div>
                    <div class="direction-option">
                        <input type="radio" name="gravity-dir" value="right">
                        <div class="direction-icon"><span class="material-symbols-outlined">arrow_forward</span></div>
                    </div>
                </div>
            </div>

            <!-- Gravity Strength -->
            <div class="slider-container">
                <div class="slider-label">
                    <span>Gravity Strength</span>
                    <span id="gravity-val" class="slider-value">9.8 m/s²</span>
                </div>
                <input type="range" id="gravity-strength" min="0" max="50" step="0.1" value="9.8">
            </div>

            <!-- Bounciness -->
            <div class="slider-container">
                <div class="slider-label">
                    <span>Bounciness</span>
                    <span id="bounciness-val" class="slider-value">75%</span>
                </div>
                <input type="range" id="bounciness" min="0" max="1" step="0.05" value="0.75">
            </div>

            <!-- Tools -->
            <div>
                <div class="section-title">Experimental Tools</div>
                <div class="control-group">
                    <button id="shake-btn" class="btn btn-large">
                        <span class="material-symbols-outlined">vibration</span>
                        Shake Page
                        <span class="shortcut-hint">SPACE</span>
                    </button>
                    
                    <label class="toggle-row">
                        <div class="toggle-label">
                            <span class="material-symbols-outlined">all_inclusive</span>
                            Magnet Tool
                        </div>
                        <input type="checkbox" id="magnet-toggle" class="toggle-input">
                        <div class="toggle-switch">
                            <div class="toggle-knob"></div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <footer>
            <button id="exit-btn" class="btn btn-primary" style="width: 100%">
                <span class="material-symbols-outlined">power_settings_new</span>
                Exit Lab Mode
            </button>
        </footer>
    </aside>

    <script src="panel.js"></script>
</body>
</html>
